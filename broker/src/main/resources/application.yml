micronaut:
  application:
    name: messaging-broker
  server:
    port: ${HTTP_PORT:8082}  # HTTP admin port

  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
        step: PT1M  # 1 minute scrape interval
        descriptions: true
    binders:
      jvm:
        enabled: true
      processor:
        enabled: true
      uptime:
        enabled: true
      files:
        enabled: true
      logback:
        enabled: true

endpoints:
  all:
    enabled: true
    sensitive: false
  prometheus:
    enabled: true
    sensitive: false
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: true
    sensitive: false

broker:
  nodeId: ${NODE_ID:local-001}

  registry:
    url: ${REGISTRY_URL:http://localhost:8080}
    auth:
      bearer-token: ${AUTH_BEARER_TOKEN:}  # Optional bearer token for registry and pipe HTTP calls

  storage:
    type: filechannel  # FileChannel-based (no mmap) for true zero-copy via sendfile()
    dataDir: ${DATA_DIR:/Users/anuragmishra/Desktop/workspace/messaging/data/}
    segment-size: 1073741824  # 1GB

  default-topic: ${DEFAULT_TOPIC:default-topic}

  network:
    type: tcp
    port: ${BROKER_PORT:19092}
    threads:
      boss: 1
      worker: 4   # Low-CPU profile: fewer Netty workers, lower parallelism during peaks

  consumer:
    default-retry-policy: EXPONENTIAL_THEN_FIXED
    default-max-exponential-retries: 10
    default-initial-retry-delay: 1000
    default-max-retry-delay: 30000
    default-fixed-retry-interval: 30000
    # ACK timeout in milliseconds - how long to wait for consumer to ACK a batch before reverting offset
    # Baseline: 60s works for most 1-2MB batches. Increase for larger batches or slower consumers.
    # If timeout fires frequently, increase this value or reduce batch size.
    ack-timeout: ${ACK_TIMEOUT_MS:120000}  # Low-CPU profile: tolerate slower/larger deliveries

    # Send timeout: how long the broker waits for the TCP transfer itself to complete.
    # Total = base + (batch size in MB × per-mb).
    # Example: a 50 MB batch → 1 + (50 × 2) = 101 seconds.
    # Raise per-mb-seconds for slow networks; raise base-seconds for high-latency links.
    send-timeout-base-seconds: ${SEND_TIMEOUT_BASE_SECONDS:1}
    send-timeout-per-mb-seconds: ${SEND_TIMEOUT_PER_MB_SECONDS:2}
    max-message-size-per-consumer: ${MAX_MESSAGE_SIZE_PER_CONSUMER:2097152}  # 2MB batches reduce delivery frequency
    # DEPRECATED: max-batch-size-per-consumer no longer used (size-only batching now)
    # max-batch-size-per-consumer: ${MAX_BATCH_SIZE_PER_CONSUMER:100}

    # Adaptive polling configuration (watermark-based delivery)
    adaptive-polling:
      min-delay-ms: 200        # Low-CPU profile: fewer successful polls, higher delivery latency
      max-delay-ms: 5000       # Longer backoff when idle to reduce scheduler wakeups

    # Per-topic fairness configuration
    fairness:
      threads: 2                  # Low-CPU profile: smaller scheduler pool
      max-in-flight-per-topic: 1  # Serialize per-topic delivery to reduce parallel work

  pipe:
    min-poll-interval-ms: 500   # Low-CPU profile: less frequent upstream polling
    max-poll-interval-ms: 20000
    poll-limit: 5

# Legacy Client Configuration
# Maps legacy serviceName (from RegisterEvent) to list of topics
# Used by protocol adapter to auto-subscribe legacy clients
legacy-clients:
  enabled: ${LEGACY_CLIENTS_ENABLED:true}

  # Service to topics mapping
  # Key: serviceName (sent in RegisterEvent.clientId)
  # Value: list of topics to subscribe
  service-topics:
    price-quote-service:
      - prices-v1
      - reference-data-v5
      - non-promotable-products
      - prices-v4
      - minimum-price
      - deposit

    product-svc-lite:
      - product-base-document

    search-enterprise:
      - search-product

    tesco-location-service:
      - location
      - location-clusters

    customer-order-on-till:
      - selling-restrictions

    colleague-facts:
      - colleague-facts-jobs
      - colleague-facts-legacy

    loss-prevention-api:
      - loss-prevention-configuration
      - loss-prevention-store-configuration
      - loss-prevention-product
      - loss-prevention-rule-config

    stored-value-services:
      - stored-value-services-banned-promotion
      - stored-value-services-active-promotion

    colleague-identity:
      - colleague-card-pin

    distributed-identity:
      - colleague-card-pin-v2

    dcxp-content:
      - dcxp-content

    restriction-service-on-tills:
      - restriction-rules

    dcxp-ugc:
      - dcxp-ugc

executor:
  ack:
    threads: ${EXECUTOR_ACK_THREADS:2}
  consumer-scheduler:
    threads: ${EXECUTOR_CONSUMER_SCHEDULER_THREADS:2}
  storage:
    threads: ${EXECUTOR_STORAGE_THREADS:2}

ack-store:
  rocksdb:
    path: ${DATA_DIR}/ack-store
    block-cache-bytes: ${ACK_STORE_BLOCK_CACHE_BYTES:33554432}   # 32MB default
  reconciliation:
    interval: ${ACK_RECONCILIATION_INTERVAL:5m}
    initial-delay: ${ACK_RECONCILIATION_INITIAL_DELAY:2m}
    enabled: ${ACK_RECONCILIATION_ENABLED:true}
    auto-sync-enabled: ${ACK_RECONCILIATION_AUTO_SYNC:false}   # future feature, default off

logger:
  levels:
    com.messaging: WARN  # Default to warnings/errors unless a package is explicitly promoted
    com.messaging.broker.core: INFO  # Broker lifecycle and orchestration
    com.messaging.broker.refresh: INFO  # Refresh workflow state changes
    com.messaging.broker.consumer: INFO  # Consumer lifecycle, timeouts, failures; hot-path batch logs stay DEBUG
    com.messaging.broker.handler: INFO  # Subscribe / READY_ACK / RESET_ACK lifecycle events
    com.messaging.broker.legacy: INFO  # Legacy consumer lifecycle; merge internals stay DEBUG
    com.messaging.pipe: INFO  # Pipe connect/pause/resume and failures; poll traffic stays DEBUG
    io.netty: ERROR  # Only show Netty errors
